name: Release Packaging

on:
  workflow_dispatch:

env:
  ROJO_VERSION: 7.7.0-rc.1

jobs:
  package-server:
    name: Package Server + Plugin (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Rojo CLI
        shell: pwsh
        run: cargo install rojo --locked --version $env:ROJO_VERSION

      - name: Build and package release artifacts
        shell: pwsh
        run: ./tools/package_release_artifacts.ps1 -RequireRojo

      - name: Validate release manifest and artifact naming
        shell: pwsh
        run: ./tools/validate_release_manifest.ps1 -RequireInstallable

      - name: Validate packaged Day-0 artifacts
        shell: pwsh
        run: ./tools/run_day0_packaged_validation_task.ps1 -SkipPackaging

      - name: Validate published artifact Day-0 path
        shell: pwsh
        run: ./tools/run_day0_published_artifact_validation_task.ps1 -RequireInstallable

      - name: Generate release checksums
        shell: pwsh
        run: ./tools/generate_release_checksums.ps1

      - name: Verify release checksums
        shell: pwsh
        run: ./tools/generate_release_checksums.ps1 -Verify

      - name: Read release manifest
        id: read_manifest
        shell: pwsh
        run: |
          $manifestPath = 'dist/release/release_manifest.json'
          if (-not (Test-Path $manifestPath)) {
            echo "installable=false" >> $GITHUB_OUTPUT
            echo "artifact=" >> $GITHUB_OUTPUT
            exit 0
          }
          $m = Get-Content $manifestPath | ConvertFrom-Json
          if ($m.pluginInstallableAvailable -and $m.pluginInstallableArtifact) {
            echo "installable=true" >> $GITHUB_OUTPUT
            echo "artifact=$($m.pluginInstallableArtifact)" >> $GITHUB_OUTPUT
          }
          else {
            echo "installable=false" >> $GITHUB_OUTPUT
            echo "artifact=" >> $GITHUB_OUTPUT
          }

      - name: Upload plugin installable artifact
        if: steps.read_manifest.outputs.installable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.os }}
          path: dist/release/${{ steps.read_manifest.outputs.artifact }}
          if-no-files-found: error

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: dist/release/*
          if-no-files-found: error
