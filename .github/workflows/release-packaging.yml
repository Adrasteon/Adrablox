name: Release Packaging

on:
  workflow_dispatch:

jobs:
  package-server:
    name: Package Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build and package release artifacts
        shell: pwsh
        run: ./tools/package_release_artifacts.ps1

      - name: Validate packaged Day-0 artifacts
        shell: pwsh
        run: ./tools/run_day0_packaged_validation_task.ps1 -SkipPackaging

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: dist/release/*
          if-no-files-found: error
