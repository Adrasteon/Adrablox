name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_rojo_parity_diff:
        description: "Run optional MCP vs live Rojo parity fixture suite"
        required: false
        default: false
        type: boolean

jobs:
  validate-windows:
    name: Validate (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run cargo tests
        shell: pwsh
        run: |
          $cargoExe = Join-Path $env:USERPROFILE '.cargo\bin\cargo.exe'
          & $cargoExe test

      - name: Run MCP smoke task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_smoke_task.ps1

      - name: Run MCP policy contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_policy_task.ps1

      - name: Run Rojo compatibility task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_rojo_compat_task.ps1

      - name: Run Rojo changefeed edge-case task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_rojo_changefeed_task.ps1

      - name: Run MCP conflict race contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_conflict_race_task.ps1

      - name: Run MCP reconnect/replay contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_reconnect_replay_task.ps1

      - name: Run MCP invalid-session contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_invalid_session_task.ps1

      - name: Run MCP protocol contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_protocol_task.ps1

      - name: Run Rojo parity suite task (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_parity_diff == true
        shell: pwsh
        run: |
          if (-not (Get-Command rojo -ErrorAction SilentlyContinue)) {
            Write-Host "Rojo CLI not found on runner; skipping optional parity suite."
            exit 0
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_rojo_parity_suite_task.ps1

      - name: Build parity summary artifact (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_parity_diff == true
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/summarize_parity_reports.ps1

      - name: Upload parity reports artifact (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_parity_diff == true
        uses: actions/upload-artifact@v4
        with:
          name: rojo-parity-reports
          path: |
            tools/parity_diff_report*.json
            tools/parity_diff_summary.json
          if-no-files-found: warn

  validate-unix:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run cargo tests
        run: cargo test

      - name: Make protocol task executable
        run: chmod +x tools/run_mcp_protocol_task.sh

      - name: Run MCP protocol contract task
        run: tools/run_mcp_protocol_task.sh
