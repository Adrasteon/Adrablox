name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_rojo_parity_diff:
        description: "Run optional MCP vs live Rojo parity fixture suite"
        required: false
        default: false
        type: boolean
      strict_rojo_parity:
        description: "Fail manual parity run if reports are missing or contain diffs"
        required: false
        default: false
        type: boolean
      strict_rojo_parity_categories:
        description: "Comma-separated categories for targeted strict diff gating (e.g. baseline,structure)"
        required: false
        default: ""
        type: string
      run_rojo_edge_semantics:
        description: "Run optional focused Rojo parity edge-semantics checks"
        required: false
        default: false
        type: boolean
      run_integration_reliability_suite:
        description: "Run optional integration reliability evidence suite (Windows)"
        required: false
        default: false
        type: boolean
      run_ws_transport_suite:
        description: "Run optional WS transport replay + stream compatibility tasks (Windows)"
        required: false
        default: false
        type: boolean
      integration_reliability_iterations:
        description: "Reconnect-loop iterations for optional reliability suite (conflict/mixed use smaller derived counts)"
        required: false
        default: "5"
        type: string
      run_spec_readiness_report:
        description: "Generate optional spec readiness report from available evidence artifacts"
        required: false
        default: false
        type: boolean
      run_release_candidate_evidence_pack:
        description: "Run optional one-command release-candidate evidence pack (reliability + parity + readiness)"
        required: false
        default: false
        type: boolean
      release_candidate_include_distribution_evidence:
        description: "When evidence pack runs, also generate full distribution evidence before readiness"
        required: false
        default: false
        type: boolean
      release_candidate_fail_if_not_pass:
        description: "When evidence pack runs, fail job unless spec readiness is PASS"
        required: false
        default: true
        type: boolean

jobs:
  validate-windows:
    name: Validate (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build rbx_write converter
        shell: pwsh
        run: |
          Push-Location tools\rbx_write
          cargo build --release
          Pop-Location

      - name: Validate plugin packaging (no Rojo)
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/package_release_artifacts.ps1 -SkipServerBuild -SkipRojo -OutputDir dist/ci-no-rojo

      - name: Run cargo tests
        shell: pwsh
        run: |
          $cargoExe = Join-Path $env:USERPROFILE '.cargo\bin\cargo.exe'
          & $cargoExe test

      - name: Run MCP smoke task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_smoke_task.ps1

      - name: Run MCP policy contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_policy_task.ps1

      - name: Run Rojo compatibility task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_rojo_compat_task.ps1

      - name: Run Rojo changefeed edge-case task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_rojo_changefeed_task.ps1

      - name: Run MCP conflict race contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_conflict_race_task.ps1

      - name: Run MCP reconnect/replay contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_reconnect_replay_task.ps1

      - name: Run MCP invalid-session contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_invalid_session_task.ps1

      - name: Run MCP integration roundtrip contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_integration_roundtrip_task.ps1

      - name: Run MCP integration reconnect-loop contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_integration_reconnect_loop_task.ps1

      - name: Run MCP integration conflict-recovery contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_integration_conflict_recovery_task.ps1

      - name: Run MCP integration mixed-resilience contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_integration_mixed_resilience_task.ps1

      - name: Run MCP protocol contract task
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_protocol_task.ps1

      - name: Run integration reliability suite (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_integration_reliability_suite == true
        shell: pwsh
        run: |
          $reconnectIterations = [int]::Parse('${{ inputs.integration_reliability_iterations }}')
          $conflictIterations = [Math]::Max(1, [int]([Math]::Floor($reconnectIterations / 2)))
          $mixedIterations = [Math]::Max(1, [int]([Math]::Floor($reconnectIterations / 2)))
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_mcp_integration_reliability_suite_task.ps1 -ReconnectIterations $reconnectIterations -ConflictIterations $conflictIterations -MixedIterations $mixedIterations

      - name: Run WS replay task (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_ws_transport_suite == true
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_ws_replay_task.ps1

      - name: Run stream client compatibility task (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_ws_transport_suite == true
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_stream_client_compat_task.ps1

      - name: Upload WS transport reports artifact (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_ws_transport_suite == true
        uses: actions/upload-artifact@v4
        with:
          name: ws-transport-reports
          path: |
            tools/ws_replay_report.json
            tools/stream_client_compat_report.json
          if-no-files-found: error

      - name: Upload integration reliability report (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_integration_reliability_suite == true
        uses: actions/upload-artifact@v4
        with:
          name: integration-reliability-report-it${{ inputs.integration_reliability_iterations }}
          path: tools/integration_reliability_report.json
          if-no-files-found: error

      - name: Run Rojo parity suite task (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_parity_diff == true
        shell: pwsh
        run: |
          if (-not (Get-Command rojo -ErrorAction SilentlyContinue)) {
            Write-Host "Rojo CLI not found on runner; skipping optional parity suite."
            exit 0
          }
          $suiteArgs = @()
          $strictCategories = '${{ inputs.strict_rojo_parity_categories }}'.Trim()
          if (-not [string]::IsNullOrWhiteSpace($strictCategories)) {
            $suiteArgs += '-Categories'
            $suiteArgs += $strictCategories
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_rojo_parity_suite_task.ps1 @suiteArgs

      - name: Build parity summary artifact (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_parity_diff == true
        shell: pwsh
        run: |
          $summaryArgs = @()
          if ('${{ inputs.strict_rojo_parity }}' -eq 'true') {
            $summaryArgs += '-FailIfDiffs'
            $summaryArgs += '-FailIfNoReports'
          }
          $strictCategories = '${{ inputs.strict_rojo_parity_categories }}'.Trim()
          if (-not [string]::IsNullOrWhiteSpace($strictCategories)) {
            $summaryArgs += '-FailCategories'
            $summaryArgs += $strictCategories
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/summarize_parity_reports.ps1 @summaryArgs

      - name: Print parity summary line (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_parity_diff == true
        shell: pwsh
        run: |
          $summaryPath = Join-Path $PWD 'tools/parity_diff_summary.json'
          if (-not (Test-Path $summaryPath)) {
            Write-Host "Parity summary unavailable (missing tools/parity_diff_summary.json)."
            exit 0
          }
          $summary = Get-Content -Raw -Path $summaryPath | ConvertFrom-Json
          $fixtureCount = [int]$summary.reportCount
          $totalDiffs = [int]$summary.totalDiffCount
          $categoryParts = @()
          foreach ($category in @($summary.categoryBreakdown)) {
            $categoryName = [string]$category.category
            $categoryDiffs = [int]$category.totalDiffCount
            $categoryParts += ("{0}:{1}" -f $categoryName, $categoryDiffs)
          }
          $categorySummary = if ($categoryParts.Count -gt 0) { $categoryParts -join '|' } else { 'none' }
          Write-Host ("Parity summary: fixtures={0} totalDiffs={1} categoryDiffs={2}" -f $fixtureCount, $totalDiffs, $categorySummary)

      - name: Upload parity reports artifact (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_parity_diff == true
        uses: actions/upload-artifact@v4
        with:
          name: rojo-parity-reports
          path: |
            tools/parity_diff_report*.json
            tools/parity_diff_summary.json
          if-no-files-found: warn

      - name: Generate spec readiness report (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_spec_readiness_report == true
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_spec_readiness_report.ps1

      - name: Upload spec readiness report (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_spec_readiness_report == true
        uses: actions/upload-artifact@v4
        with:
          name: spec-readiness-report-${{ inputs.run_release_candidate_evidence_pack && 'with-pack' || 'standalone' }}
          path: tools/spec_readiness_report.json
          if-no-files-found: error

      # Rojo installation removed: packaging uses tools/package_release_artifacts.ps1

      - name: Run release-candidate evidence pack (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_release_candidate_evidence_pack == true
        shell: pwsh
        run: |
          $reconnectIterations = [int]::Parse('${{ inputs.integration_reliability_iterations }}')
          $conflictIterations = [Math]::Max(1, [int]([Math]::Floor($reconnectIterations / 2)))
          $mixedIterations = [Math]::Max(1, [int]([Math]::Floor($reconnectIterations / 2)))
          $categories = '${{ inputs.strict_rojo_parity_categories }}'.Trim()

          $packArgs = @(
            '-ReconnectIterations', $reconnectIterations,
            '-ConflictIterations', $conflictIterations,
            '-MixedIterations', $mixedIterations
          )

          if (-not [string]::IsNullOrWhiteSpace($categories)) {
            $packArgs += @('-Categories', $categories)
          }

          if ('${{ inputs.release_candidate_include_distribution_evidence }}' -eq 'true') {
            $packArgs += '-IncludeDistributionEvidence'
          }

          if ('${{ inputs.release_candidate_fail_if_not_pass }}' -eq 'true') {
            $packArgs += '-FailIfNotPass'
          }

          powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_release_candidate_evidence_pack_task.ps1 @packArgs

      - name: Upload release-candidate evidence artifact (distribution on)
        if: github.event_name == 'workflow_dispatch' && inputs.run_release_candidate_evidence_pack == true && inputs.release_candidate_include_distribution_evidence == true
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-evidence-it${{ inputs.integration_reliability_iterations }}-dist-on
          path: |
            tools/integration_reliability_report.json
            tools/parity_diff_report*.json
            tools/parity_diff_summary.json
            tools/spec_readiness_report.json
          if-no-files-found: warn

      - name: Upload release-candidate evidence artifact (distribution off)
        if: github.event_name == 'workflow_dispatch' && inputs.run_release_candidate_evidence_pack == true && inputs.release_candidate_include_distribution_evidence != true
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-evidence-it${{ inputs.integration_reliability_iterations }}-dist-off
          path: |
            tools/integration_reliability_report.json
            tools/parity_diff_report*.json
            tools/parity_diff_summary.json
            tools/spec_readiness_report.json
          if-no-files-found: warn

      - name: Print spec readiness summary (optional)
        if: github.event_name == 'workflow_dispatch' && (inputs.run_spec_readiness_report == true || inputs.run_release_candidate_evidence_pack == true)
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools/print_spec_readiness_summary.ps1

      - name: Run Rojo parity edge semantics task (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.run_rojo_edge_semantics == true
        shell: pwsh
        run: |
          if (-not (Get-Command rojo -ErrorAction SilentlyContinue)) {
            Write-Host "Rojo CLI not found on runner; skipping optional parity edge semantics checks."
            exit 0
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/run_rojo_parity_edge_semantics_task.ps1

  validate-unix:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run cargo tests
        run: cargo test

      - name: Build rbx_write converter
        run: |
          cd tools/rbx_write
          cargo build --release

      - name: Make protocol task executable
        run: chmod +x tools/run_mcp_protocol_task.sh

      - name: Run MCP protocol contract task
        run: tools/run_mcp_protocol_task.sh
